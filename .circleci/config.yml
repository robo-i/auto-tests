version: 2.1
jobs:
  test:
    working_directory: ~/auto-tests
    docker:
      - image: mpowleslandcook/node10-gulp
    steps:
      - checkout
      - run:
          name: Update npm
          command: 'npm i -g npm@latest'
      - run:
          name: Install dependencies
          command: 'npm i'
      - run:
          name: Test
          command: 'gulp'
      - store_artifacts:
          path: ./report/report.html

workflows:
  version: 2
  build_and_test:
    jobs:
      - test